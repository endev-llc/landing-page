<!DOCTYPE html>

<head>

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7BXWB9545"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L7BXWB9545');
    var source = new URLSearchParams(window.location.search).get('source') || 'direct';

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 420px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.3em;
      text-align: center;
      padding: 1.2em;
      position: relative;
    }

    /* --- Tap-here arrow top-right --- */
    .tap-arrow {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      animation: pulse 2s ease-in-out infinite;
    }
    .tap-arrow svg {
      width: 44px;
      height: 44px;
      filter: drop-shadow(0 2px 6px rgba(0,120,255,0.3));
    }
    .tap-arrow span {
      font-size: 0.75rem;
      font-weight: 600;
      color: #007aff;
      white-space: nowrap;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translateY(0); }
      50% { opacity: 0.6; transform: translateY(-4px); }
    }

    /* --- Creator --- */
    .creator {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 0.88rem;
      color: #888;
    }
    .creator img {
      width: 30px; height: 30px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* --- App icon --- */
    .app-icon {
      width: 115px; height: 115px;
      border-radius: 22%;
      object-fit: cover;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }

    /* --- Tagline --- */
    .tagline {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }
    .tagline .highlight {
      color: #007aff;
    }

    /* --- CTA --- */
    .cta {
      display: inline-block;
      padding: 18px 75px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      background: #000;
      border: none;
      border-radius: 16px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,0,0,0.3); }
    .cta:active { transform: scale(0.97); }

    /* --- Instructions --- */
    .instructions {
      background: #fff;
      border: 1px solid #e8e8ea;
      border-radius: 14px;
      padding: 0.9em 1.3em;
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
      width: 92%;
      max-width: 340px;
    }
    .instructions strong { color: #1d1d1f; }

    @media (max-height: 640px) {
      .page { gap: 0.8em; }
      .app-icon { width: 85px; height: 85px; }
      .tagline { font-size: 1.5rem; }
      .cta { padding: 0.9em 2.6em; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="tap-arrow">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="40" height="40" rx="10" fill="#007aff"/>
        <path d="M16 28L28 16M28 16H18M28 16v10" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Tap here</span>
    </div>

    <div class="creator">
      <img src="pfpnew.png" alt="Jake">
      @jakecalorie
    </div>

    <img src="pocketscale-logo.png" alt="PocketScale" class="app-icon">

    <div class="tagline">
      The Solution To<br><span class="highlight">Calorie Counting.</span>
    </div>

    <a class="cta" href="https://apps.apple.com/us/app/pocketscale-calorie-scanner/id6748204956" onclick="gtag('event','download_click',{source:source,page_type:'pocketscale'})">Download!</a>

    <div class="instructions">
      On TikTok, tap <strong>"···" </strong> at the top right<br>
      Then tap <strong>"Open in browser"</strong><br>
      Then tap <strong>"Download!"</strong> above
    </div>

  </div>

</body>
</html>
